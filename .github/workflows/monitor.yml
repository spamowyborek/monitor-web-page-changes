name: Monitor web page changes

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to monitor
        required: false
        type: string
  # schedule:
  #   - cron: '0 */2 * * *'

env:
  DEFAULT_URL: >-
    ${{ vars.MONITOR_URL ||
    'https://www.booking.com/searchresults.html?label=gen173nr-10CAEoggI46AdIM1gEaLYBiAEBmAEzuAEXyAEM2AED6AEB-AEBiAIBqAIBuAKf4f3OBsACAdICJGJlNTQ4ODQ5LTUwM2UtNDk5Ny04NGI4LTI0ZTIyNTU0MjhhYtgCAeACAQ&aid=304142&ss=Budapest%2C+Central+Hungary%2C+Hungary&efdco=1&lang=en-us&src=index&dest_id=-850553&dest_type=city&ac_position=0&ac_click_type=b&ac_langcode=xu&ac_suggestion_list_length=5&search_selected=true&search_pageview_id=797d4dcf1a4301bd&checkin=2026-05-29&checkout=2026-05-31&group_adults=2&no_rooms=1&group_children=2&age=9&age=8&nflt=price%3DUSD-min-300-1'
    }}
  SCREENSHOT_DELAY_MS: '2000'
  PIXELMATCH_THRESHOLD: '0.1'
  MIN_CHANGED_PIXELS: '100'

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Resolve monitored URL
        id: resolve-url
        run: |
          resolved_url="${{ github.event.inputs.url }}"

          if [ -z "$resolved_url" ]; then
            resolved_url="${DEFAULT_URL}"
          fi

          if [ -z "$resolved_url" ]; then
            echo "Missing monitored URL. Set workflow input 'url' or repository variable MONITOR_URL." >&2
            exit 1
          fi

          echo "url=$resolved_url" >> "$GITHUB_OUTPUT"

      - name: Run monitor
        id: monitor
        env:
          MONITOR_URL: ${{ steps.resolve-url.outputs.url }}
        run: npm run monitor -- "${MONITOR_URL}"

      # - name: Send change notification email
      #   if: steps.monitor.outputs.changed == 'true'
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: ${{ secrets.SMTP_SERVER }}
      #     server_port: ${{ secrets.SMTP_PORT }}
      #     username: ${{ secrets.SMTP_USERNAME }}
      #     password: ${{ secrets.SMTP_PASSWORD }}
      #     subject: Wykryto zmianę na monitorowanej stronie
      #     to: boryzo@gmail.com
      #     from: boryzo@gmail.com
      #     html_body: |
      #       <p>Wykryto zmianę na stronie: <a href="${{ steps.resolve-url.outputs.url }}">${{ steps.resolve-url.outputs.url }}</a></p>
      #       <p>Liczba różniących się pikseli: ${{ steps.monitor.outputs.changed_pixels }}</p>
      #     attachments: diff.png

      - name: Commit updated baseline screenshot
        if: steps.monitor.outputs.baseline_updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update baseline screenshot'
          file_pattern: last_screenshot.png
